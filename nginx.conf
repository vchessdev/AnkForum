server {
    listen 80;
    server_name ankb.work.gd www.ankb.work.gd;
    root /var/www/ankforum;
    index index.php;
    charset utf-8;

    client_max_body_size 512M;

    # Protect data directory
    location /data/ {
        deny all;
        return 404;
    }

    # Protect log files
    location ~* \.(log|json|bak|sql|env)$ {
        deny all;
        return 404;
    }

    # PHP files
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Static assets - serve directly with caching
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # Uploads - serve directly
    location /uploads/ {
        try_files $uri =404;
    }

    # API routes
    location /api/ {
        try_files $uri $uri/ /api/$uri.php?$query_string;
    }

    # Everything else to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
